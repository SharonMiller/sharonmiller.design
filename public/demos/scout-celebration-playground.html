<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scout Celebration Playground</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; }
  .wrap { display: flex; min-height: 100vh; }
  .controls {
    width: 280px; flex-shrink: 0; padding: 24px 20px;
    background: #1a1a2e; color: #ccc; font-size: 13px;
    overflow-y: auto;
  }
  .controls h2 { color: #fff; font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .controls p { color: #888; font-size: 12px; margin-bottom: 20px; line-height: 1.5; }
  .section-label { color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; margin: 18px 0 10px; }
  .ctrl { margin-bottom: 12px; }
  .ctrl label { display: flex; justify-content: space-between; margin-bottom: 5px; color: #aaa; font-size: 12px; }
  .ctrl label span { color: #fff; }
  input[type=range] {
    width: 100%; height: 4px; appearance: none;
    background: #333; border-radius: 2px; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    appearance: none; width: 14px; height: 14px;
    background: #7c96f6; border-radius: 50%;
  }
  .color-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .color-swatch { position: relative; }
  .color-swatch input[type=color] {
    width: 36px; height: 36px; border: 2px solid #333;
    border-radius: 8px; cursor: pointer; padding: 2px; background: #222;
  }
  .copy-btn {
    width: 100%; margin-top: 20px; padding: 10px;
    background: rgba(124,150,246,0.15); border: 1px solid rgba(124,150,246,0.4);
    color: #7c96f6; border-radius: 8px; font-size: 12px;
    cursor: pointer; letter-spacing: 0.04em;
    transition: background 0.2s;
  }
  .copy-btn:hover { background: rgba(124,150,246,0.25); }
  .copy-btn.copied { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.4); color: #22c55e; }
  .preview {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: #fff; position: relative; overflow: hidden;
  }
  .scene { width: 440px; height: 440px; position: relative; display: flex; align-items: center; justify-content: center; }
  .blob-wrap { position: absolute; inset: 0; }
  .blob { position: absolute; border-radius: 50%; }
  .card {
    position: relative; z-index: 10; background: white;
    border-radius: 16px; padding: 24px 28px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
    min-width: 280px;
  }
  .card-title { font-size: 15px; font-weight: 500; color: #111; display: flex; align-items: center; gap: 8px; }
  .card-sub { font-size: 13px; color: #888; margin: 4px 0 16px; }
  .btn {
    background: white; border: 1.5px solid #ddd; border-radius: 100px;
    padding: 8px 20px; font-size: 11px; font-weight: 700;
    letter-spacing: 0.09em; cursor: pointer; color: #333;
    transition: background 0.15s;
  }
  .btn:hover { background: #f5f5f5; }
  svg.hidden-filters { position: absolute; width: 0; height: 0; pointer-events: none; }
</style>
</head>
<body>

<svg class="hidden-filters">
  <defs>
    <filter id="smoky" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feTurbulence id="turb" type="fractalNoise" baseFrequency="0.018 0.012" numOctaves="4" seed="2" result="noise"/>
      <feDisplacementMap id="disp" in="SourceGraphic" in2="noise" scale="60" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="1.5"/>
    </filter>
  </defs>
</svg>

<div class="wrap">
  <div class="controls">
    <h2>Animation playground</h2>
    <p>Scout celebration animation.<br>
    Adjust the sliders to dial in the smoky blob look.</p>

    <div class="section-label">Motion</div>
    <div class="ctrl">
      <label>Speed <span id="lbl-speed">1.0</span>×</label>
      <input type="range" id="ctrl-speed" min="0.1" max="4" step="0.1" value="1">
    </div>
    <div class="ctrl">
      <label>Drift amount <span id="lbl-drift">14</span>%</label>
      <input type="range" id="ctrl-drift" min="2" max="40" step="1" value="14">
    </div>

    <div class="section-label">Edge shape</div>
    <div class="ctrl">
      <label>Turbulence <span id="lbl-turb">0.018</span></label>
      <input type="range" id="ctrl-turb" min="0.004" max="0.07" step="0.001" value="0.018">
    </div>
    <div class="ctrl">
      <label>Displacement <span id="lbl-disp">60</span>px</label>
      <input type="range" id="ctrl-disp" min="10" max="180" step="2" value="60">
    </div>

    <div class="section-label">Blobs</div>
    <div class="ctrl">
      <label>Blur <span id="lbl-blur">60</span>px</label>
      <input type="range" id="ctrl-blur" min="10" max="140" step="2" value="60">
    </div>
    <div class="ctrl">
      <label>Size <span id="lbl-size">80</span>%</label>
      <input type="range" id="ctrl-size" min="30" max="140" step="2" value="80">
    </div>
    <div class="ctrl">
      <label>Opacity <span id="lbl-opacity">0.90</span></label>
      <input type="range" id="ctrl-opacity" min="0.2" max="1" step="0.01" value="0.9">
    </div>

    <div class="section-label">Colors</div>
    <div class="color-row">
      <div class="color-swatch"><input type="color" id="c1" value="#ff8a65" title="Mesh 1"></div>
      <div class="color-swatch"><input type="color" id="c2" value="#ff6fae" title="Mesh 2"></div>
      <div class="color-swatch"><input type="color" id="c3" value="#ffd166" title="Mesh 3"></div>
      <div class="color-swatch"><input type="color" id="c4" value="#7c96f6" title="Mesh 4"></div>
    </div>

    <button class="copy-btn" id="copy-btn">Copy CSS variables as JSON</button>
  </div>

  <div class="preview">
    <div class="scene">
      <div class="blob-wrap" id="blob-wrap" style="filter:url(#smoky)">
        <div class="blob" id="b1"></div>
        <div class="blob" id="b2"></div>
        <div class="blob" id="b3"></div>
        <div class="blob" id="b4"></div>
        <div class="blob" id="b5"></div>
      </div>
      <div class="card">
        <div class="card-title">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle cx="10" cy="10" r="9" stroke="#22c55e" stroke-width="1.5"/>
            <path d="M6 10l3 3 5-5" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          You finished setup
        </div>
        <div class="card-sub">Your workspace is ready for clients.</div>
        <button class="btn">GO TO DASHBOARD</button>
      </div>
    </div>
  </div>
</div>

<script>
const blobs = [
  { el: document.getElementById('b1'), ox: 0.50, oy: 0.50, phase: 0.0  },
  { el: document.getElementById('b2'), ox: 0.28, oy: 0.32, phase: 1.2  },
  { el: document.getElementById('b3'), ox: 0.72, oy: 0.66, phase: 2.4  },
  { el: document.getElementById('b4'), ox: 0.42, oy: 0.74, phase: 0.8  },
  { el: document.getElementById('b5'), ox: 0.66, oy: 0.26, phase: 3.5  },
];

let speed = 1, drift = 0.14, turbFreq = 0.018, dispScale = 60;
let blurPx = 60, sizeP = 80, opacityV = 0.9;
let colors = ['#ff8a65','#ff6fae','#ffd166','#7c96f6','#ff8a65'];
let t = 0, last = null;

function hex2rgb(h) {
  return [
    parseInt(h.slice(1,3),16),
    parseInt(h.slice(3,5),16),
    parseInt(h.slice(5,7),16)
  ].join(',');
}

function applyBlobs() {
  const scene = document.querySelector('.scene');
  const W = scene.offsetWidth, H = scene.offsetHeight;
  const S = (sizeP / 100) * Math.min(W, H);
  blobs.forEach((bd, i) => {
    const bx = (bd.ox + Math.sin(t * 0.38 + bd.phase) * drift) * W - S/2;
    const by = (bd.oy + Math.cos(t * 0.29 + bd.phase * 1.3) * drift) * H - S/2;
    Object.assign(bd.el.style, {
      width: S + 'px', height: S + 'px',
      left: bx + 'px', top: by + 'px',
      filter: `blur(${blurPx}px)`,
      background: `rgba(${hex2rgb(colors[i % colors.length])}, ${opacityV})`
    });
  });
}

function animateTurb() {
  const turb = document.getElementById('turb');
  const bf1 = turbFreq + Math.sin(t * 0.07) * turbFreq * 0.28;
  const bf2 = turbFreq * 0.62 + Math.cos(t * 0.09) * turbFreq * 0.22;
  const seed = 2 + Math.sin(t * 0.13) * 2;
  turb.setAttribute('baseFrequency', `${bf1.toFixed(4)} ${bf2.toFixed(4)}`);
  turb.setAttribute('seed', seed.toFixed(2));
  document.getElementById('disp').setAttribute('scale', dispScale + Math.sin(t * 0.18) * 10);
}

function frame(ts) {
  if (!last) last = ts;
  t += ((ts - last) / 1000) * speed;
  last = ts;
  applyBlobs();
  animateTurb();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

function bind(id, lbl, setter, fmt) {
  const el = document.getElementById(id);
  el.addEventListener('input', () => {
    const v = parseFloat(el.value);
    document.getElementById(lbl).textContent = fmt ? fmt(v) : v;
    setter(v);
  });
}

bind('ctrl-speed',   'lbl-speed',   v => speed = v,      v => v.toFixed(1));
bind('ctrl-drift',   'lbl-drift',   v => drift = v/100,  v => v);
bind('ctrl-turb',    'lbl-turb',    v => turbFreq = v,   v => v.toFixed(3));
bind('ctrl-disp',    'lbl-disp',    v => dispScale = v,  v => v);
bind('ctrl-blur',    'lbl-blur',    v => blurPx = v,     v => v);
bind('ctrl-size',    'lbl-size',    v => sizeP = v,      v => v);
bind('ctrl-opacity', 'lbl-opacity', v => opacityV = v,   v => v.toFixed(2));

['c1','c2','c3','c4'].forEach((id, i) => {
  document.getElementById(id).addEventListener('input', e => colors[i] = e.target.value);
});

document.getElementById('copy-btn').addEventListener('click', () => {
  const json = {
    "--scout-celebration-speed": String(speed),
    "--scout-celebration-turb-freq": turbFreq.toFixed(4),
    "--scout-celebration-displacement": String(dispScale),
    "--scout-celebration-blob-blur": blurPx + "px",
    "--scout-celebration-blob-size": sizeP + "%",
    "--scout-celebration-opacity": String(opacityV),
    "--scout-celebration-mesh-1": colors[0],
    "--scout-celebration-mesh-2": colors[1],
    "--scout-celebration-mesh-3": colors[2],
    "--scout-celebration-mesh-4": colors[3],
  };
  navigator.clipboard.writeText(JSON.stringify(json, null, 2)).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy CSS variables as JSON'; btn.classList.remove('copied'); }, 2000);
  });
});
</script>
</body>
</html>
