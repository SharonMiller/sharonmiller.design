<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scout Thinking Animation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0ed; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }

  h1 { font-size: 14px; font-weight: 500; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 32px; }

  .cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-bottom: 32px; }

  .card {
    background: white; border-radius: 16px; padding: 24px 18px 16px;
    border: 2px solid transparent; cursor: pointer; text-align: center;
    transition: border-color 0.2s; min-width: 120px;
  }
  .card:hover { border-color: #ddd; }
  .card.on { border-color: #1a1a1a; }
  .card-lbl { font-size: 11px; color: #aaa; margin-top: 12px; }
  .card-name { font-size: 13px; color: #222; font-weight: 500; margin-top: 2px; }

  /* Avatar */
  .av { width: 64px; height: 76px; position: relative; margin: 0 auto; display: flex; align-items: flex-end; justify-content: center; }
  .face { width: 64px; height: 64px; position: relative; flex-shrink: 0; }
  .face svg.base { width: 64px; height: 64px; position: absolute; }
  .mouth-mask { position: absolute; background: white; width: 16px; height: 8px; left: 13px; bottom: 7px; border-radius: 2px; }
  .mouth-line { position: absolute; left: 13px; bottom: 10px; width: 16px; height: 2px; background: black; border-radius: 1px; }

  /* A: Thought bubble */
  .bubble-wrap { position: absolute; top: -2px; right: -10px; }
  .bubble-dot { border-radius: 50%; background: #222; position: absolute; }
  .card.on .bubble-dot { animation: bpop 1.6s ease-in-out infinite; }
  .bd1 { width: 5px; height: 5px; right: 0; bottom: 0; animation-delay: 0s !important; }
  .bd2 { width: 7px; height: 7px; right: 8px; bottom: 7px; animation-delay: 0.2s !important; }
  .bd3 { width: 10px; height: 10px; right: 16px; bottom: 15px; animation-delay: 0.4s !important; }
  @keyframes bpop { 0%,100%{opacity:0.2;transform:scale(0.7)} 50%{opacity:1;transform:scale(1)} }

  /* B: Halo arc */
  .halo { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 52px; height: 26px; }
  .card.on .halo-path { animation: hglow 1.8s ease-in-out infinite; }
  @keyframes hglow { 0%,100%{opacity:0.15;stroke-width:1.5} 50%{opacity:1;stroke-width:2.5} }

  /* C: Question mark */
  .qmark { position: absolute; top: -18px; right: -8px; font-size: 22px; color: #222; font-weight: 700; line-height: 1; opacity: 0; }
  .card.on .qmark { animation: qfade 2s ease-in-out infinite; }
  @keyframes qfade { 0%,100%{opacity:0;transform:translateY(4px) scale(0.8)} 25%,75%{opacity:1;transform:translateY(0) scale(1)} }

  /* D: Lightbulb */
  .card.on .bulb-svg { animation: bglow 1.6s ease-in-out infinite; }
  @keyframes bglow { 0%,100%{opacity:0.25} 50%{opacity:1} }

  /* E: Steam */
  .steam { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
  .wisp { width: 3px; height: 12px; border-radius: 2px; background: #333; opacity: 0; transform-origin: bottom center; }
  .card.on .wisp:nth-child(1) { animation: wrise 1.4s 0.0s ease-out infinite; }
  .card.on .wisp:nth-child(2) { animation: wrise 1.4s 0.3s ease-out infinite; }
  .card.on .wisp:nth-child(3) { animation: wrise 1.4s 0.6s ease-out infinite; }
  @keyframes wrise { 0%{opacity:0;transform:translateY(0) scaleY(0.5)} 30%{opacity:0.8} 100%{opacity:0;transform:translateY(-12px) scaleY(1.2)} }

  /* F: Orbit */
  .orbit-ring { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 64px; height: 64px; pointer-events: none; }
  .orbit-dot { width: 7px; height: 7px; border-radius: 50%; background: #222; position: absolute; top: -3px; left: 50%; margin-left: -3.5px; opacity: 0; }
  .card.on .orbit-ring { animation: spin 2s linear infinite; }
  .card.on .orbit-dot { opacity: 1; }
  @keyframes spin { from{transform:translateX(-50%) rotate(0deg)} to{transform:translateX(-50%) rotate(360deg)} }

  /* Head tilt on active */
  .card.on .face { animation: htilt 2.6s cubic-bezier(0.45,0,0.55,1) infinite; transform-origin: 50% 50%; }
  @keyframes htilt {
    0%   { transform: rotate(0deg); }
    12%  { transform: rotate(-11deg); }
    44%  { transform: rotate(-11deg); }
    56%  { transform: rotate(0deg); }
    72%  { transform: rotate(-7deg); }
    88%  { transform: rotate(-7deg); }
    100% { transform: rotate(0deg); }
  }

  .note { font-size: 13px; color: #aaa; text-align: center; }
</style>
</head>

<script>
function pick(id) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('on'));
  document.getElementById('c-' + id).classList.add('on');
}
</script>
